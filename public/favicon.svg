<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Deep ink background -->
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a3a58"/>
      <stop offset="100%" stop-color="#081625"/>
    </radialGradient>
    <!-- Gold shimmer for centre dot -->
    <radialGradient id="gold-glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#E2CC97"/>
      <stop offset="100%" stop-color="#C7A24A"/>
    </radialGradient>
    <!-- Wine shimmer for left dot -->
    <radialGradient id="wine-glow" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#a03343"/>
      <stop offset="100%" stop-color="#7A2331"/>
    </radialGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Subtle top-left light catch -->
  <rect width="64" height="32" rx="14" fill="rgba(255,255,255,0.03)"/>

  <!-- Three dots: Birth · Death · Rebirth -->
  <!-- Left dot — Ink (Birth) -->
  <circle cx="15" cy="35" r="5.5" fill="#3C5A75" opacity="0.9"/>

  <!-- Centre dot — Wine (Loss/Death) — slightly raised -->
  <circle cx="32" cy="29" r="7" fill="url(#wine-glow)"/>

  <!-- Right dot — Gold (Rebuilding) -->
  <circle cx="49" cy="35" r="5.5" fill="url(#gold-glow)"/>

  <!-- Connecting thread line through all three dots -->
  <path d="M15 35 Q23.5 22 32 29 Q40.5 36 49 35" 
        fill="none" 
        stroke="rgba(243,239,227,0.22)" 
        stroke-width="1.2" 
        stroke-linecap="round"/>

  <!-- "F" initial monogram below — small, mono style -->
  <text x="32" y="52" 
        font-family="Georgia, serif" 
        font-size="9" 
        font-weight="600" 
        fill="rgba(243,239,227,0.45)" 
        text-anchor="middle" 
        letter-spacing="0.12em">DR.F</text>
</svg>